version: '3.8'

services:
  sendikalveri-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/mazisel/sendikalveri:latest
    container_name: sendikalveri-app
    restart: unless-stopped
    ports:
      - "3050:3000"
    environment:
      - NODE_ENV=production
      # Server-only, read at runtime. Values come from the Portainer stack env
      # vars (substituted here). NEXT_PUBLIC_* names can't be used at runtime —
      # they are frozen into the bundle at build time.
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    networks:
      - sendikalveri-network

networks:
  sendikalveri-network:
    driver: bridge
