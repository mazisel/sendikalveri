version: '3.8'

services:
  sendikalveri-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sendikalveri:latest
    container_name: sendikalveri-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # - NEXT_PUBLIC_SUPABASE_URL=your_supabase_url
      # - NEXT_PUBLIC_SUPABASE_ANON_KEY=your_supabase_anon_key
    networks:
      - sendikalveri-network

networks:
  sendikalveri-network:
    driver: bridge
